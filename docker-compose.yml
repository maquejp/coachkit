services:
  app:
    build:
      context: ./application/backend
      dockerfile: Dockerfile
    container_name: coachkit-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./application/backend:/var/www
    depends_on:
      pgsql:
        condition: service_healthy
    networks:
      - coachkit

  nginx:
    image: nginx:1.27-alpine
    container_name: coachkit-nginx
    restart: unless-stopped
    ports:
      - "8001:80"
    volumes:
      - ./application/backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - coachkit

  pgsql:
    image: postgres:17-alpine
    container_name: coachkit-pgsql
    restart: unless-stopped
    environment:
      POSTGRES_DB: coachkit
      POSTGRES_USER: coachkit
      POSTGRES_PASSWORD: coachkit
    ports:
      - "5432:5432"
    volumes:
      - pgsql-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coachkit"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - coachkit

  mailpit:
    image: axllent/mailpit:latest
    container_name: coachkit-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - coachkit

networks:
  coachkit:
    driver: bridge

volumes:
  pgsql-data:
